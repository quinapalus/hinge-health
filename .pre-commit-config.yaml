repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/sqlfluff/sqlfluff
    rev: 2.1.1
    hooks:
    -   id: sqlfluff-lint
        files: ^models/.*\.sql$
        args: [--dialect, snowflake]
    -   id: sqlfluff-fix
        files: ^models/.*\.sql$
        args: [--dialect, snowflake]
