version: 2

models:
  - name: sports_league
    description: Final cleaned sports league data excluding invalid records
    columns:
      - name: primary_key
        description: "Primary Key"
        tests:
          - unique:
              tags: [ unique ]
          - not_null
      - name: first_name
        description: "Member's first name"
        tests:
          - not_null

      - name: last_name
        description: "Member's last name"
        tests:
          - not_null

      - name: date_of_birth
        description: "Member's date of birth"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "<= membership_start_date"

      - name: membership_start_date
        description: "Date when the member joined"
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "<= last_active_date"

      - name: last_active_date
        description: "Date of member's last activity"
        tests:
          - not_null

      - name: company_name
        description: "Name of member's associated company"
        tests:
          - not_null

      - name: score
        description: "Member's activity score"
        tests:
          - not_null

      - name: state
        description: "Member's state of residence"
        tests:
          - not_null
          - accepted_values:
              values: ['AL', 'AK', 'AZ', 'AR', 'CA', 'CO','CT','DC','DE', 'FL', 'GA',
                      'HI', 'ID', 'IL', 'IN', 'IA', 'KS', 'KY', 'LA', 'ME', 'MD', 
                      'MA', 'MI', 'MN', 'MS', 'MO', 'MT', 'NE', 'NV', 'NH', 'NJ', 
                      'NM', 'NY', 'NC', 'ND', 'OH', 'OK', 'OR', 'PA', 'RI', 'SC', 
                      'SD', 'TN', 'TX', 'UT', 'VT', 'VA', 'WA', 'WV', 'WI', 'WY']

      - name: source
        description: "Data source identifier"
        tests:
          - not_null
